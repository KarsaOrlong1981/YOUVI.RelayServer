app = "youvi-relay-server"

[build]
  dockerfile = "Dockerfile"

[[services]]
  internal_port = 5002
  protocol = "tcp"

  [services.concurrency]
    soft_limit = 25
    hard_limit = 50

  [[services.ports]]
    handlers = ["http"]
    port = 80

  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443
